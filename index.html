<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="description" content="Simple, fast marks calculator to total copies with history tracking."/>
<meta name="theme-color" content="#0f0f0f"/>
<title>Marks Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #0f0f0f;
  --bg2:       #1a1a1a;
  --bg3:       #222;
  --bg4:       #2a2a2a;
  --border:    #2e2e2e;
  --border2:   #3a3a3a;
  --text:      #f0f0f0;
  --text2:     #888;
  --text3:     #555;
  --green:     #1fba84;
  --green-dim: #145c42;
  --amber:     #e89c2f;
  --red:       #e04a4a;
  --mono:      'DM Mono', monospace;
  --sans:      'DM Sans', sans-serif;
}
body.light {
  --bg:        #f4f4f2;
  --bg2:       #ffffff;
  --bg3:       #eaeae8;
  --bg4:       #e2e2e0;
  --border:    #d8d8d5;
  --border2:   #c8c8c4;
  --text:      #111;
  --text2:     #666;
  --text3:     #aaa;
  --green-dim: #d0f2e6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;
  background:radial-gradient(circle at top, #1e1e1e 0, #050505 52%, #000 100%);
  font-family:var(--sans);
  color:var(--text);
}
body{
  display:flex;
  justify-content:center;
}
.app{
  width:100%;
  max-width:460px;
  margin:0 auto;
  padding:16px 14px 20px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 0 8px}
.app-label{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.topbar-right{display:flex;align-items:center;gap:8px}
.saved-tag{font-family:var(--mono);font-size:11px;color:var(--green);opacity:0;transition:opacity .4s;letter-spacing:.06em}
.saved-tag.show{opacity:1}
.icon-btn{background:none;border:1px solid var(--border2);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:12px;color:var(--text2);font-family:var(--sans);transition:border-color .15s,color .15s}
.icon-btn:active{background:var(--bg3)}

/* score card */
.score-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px 20px 18px;
  box-shadow:0 18px 40px rgba(0,0,0,.45);
}
.outof-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.outof-label{font-size:12px;color:var(--text3);font-family:var(--mono);letter-spacing:.06em}
.outof-inp{width:58px;text-align:center;font-size:14px;font-weight:500;font-family:var(--mono);padding:5px 6px;border:1px solid var(--border2);border-radius:8px;background:var(--bg3);color:var(--text);-moz-appearance:textfield;outline:none}
.outof-inp:focus{border-color:var(--green)}
.outof-inp::-webkit-inner-spin-button,.outof-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.score-main{text-align:center;padding:6px 0 4px}
.score-num{font-family:var(--mono);font-size:60px;font-weight:500;line-height:1;letter-spacing:-3px;transition:color .2s}
.score-sub{font-size:13px;color:var(--text2);margin-top:6px;font-family:var(--mono)}
.score-hint{margin-top:4px;font-size:12px;color:var(--text3);font-family:var(--mono);opacity:.7}
.score-hint span+span{margin-left:6px}
.bar-wrap{margin-top:14px}
.bar-track{height:5px;border-radius:99px;background:var(--bg4);overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .3s cubic-bezier(.4,0,.2,1),background .3s}

/* action row — two buttons */
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-save{padding:16px 10px;border:none;border-radius:14px;font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;touch-action:manipulation;transition:transform .1s,background .15s}
.btn-save.active{background:var(--green);color:#fff}
.btn-save.active:active{transform:scale(.97);background:#19a872}
.btn-save.inactive{background:var(--bg3);color:var(--text3);pointer-events:none;border:1px solid var(--border)}
.btn-skip{padding:16px 10px;border:1px solid var(--border2);border-radius:14px;font-size:15px;font-weight:500;font-family:var(--sans);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;touch-action:manipulation;background:var(--bg2);color:var(--text2);transition:transform .1s,background .15s,color .15s,border-color .15s}
.btn-skip:active{transform:scale(.97);background:var(--bg3)}
.btn-skip.has-work{color:var(--amber);border-color:var(--amber)}
.btn-skip.inactive{background:var(--bg3);color:var(--text3);pointer-events:none}

/* entries strip */
.entries-strip{display:flex;align-items:center;gap:6px;overflow:hidden}
.entry-chip{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:13px;font-weight:500;font-family:var(--mono);color:var(--text2);white-space:nowrap;flex-shrink:0}
.entry-chip.latest{background:var(--bg4);border-color:var(--border2);color:var(--text)}
.strip-label{font-size:11px;color:var(--text3);font-family:var(--mono);white-space:nowrap;flex-shrink:0}

/* input + keyboard card */
.kbd-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px;
  box-shadow:0 18px 40px rgba(0,0,0,.45);
}
.disp-row{display:flex;gap:8px;align-items:stretch;margin-bottom:12px}
.display-box{background:var(--bg3);border-radius:10px;text-align:center;padding:12px;min-height:60px;display:flex;align-items:center;justify-content:center;flex:1}
.skip-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:0 14px;cursor:pointer;font-size:12px;font-weight:500;font-family:var(--mono);color:var(--text3);white-space:nowrap;touch-action:manipulation;transition:background .1s,color .1s,border-color .1s;letter-spacing:.04em}
.skip-btn:active{background:var(--bg4);color:var(--text2)}
.skip-btn.has-work{color:var(--amber);border-color:var(--amber)}
.disp-val{font-family:var(--mono);font-size:42px;font-weight:500;letter-spacing:-1px;color:var(--text);transition:color .15s}
.disp-val.empty{color:var(--text3)}
.warn-row{background:#2a1a0a;border:1px solid #5a3a10;border-radius:8px;padding:8px 12px;font-size:13px;color:#e89c2f;font-weight:500;text-align:center;margin-bottom:12px;font-family:var(--mono)}
.kbd{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.k{background:var(--bg3);border:1px solid var(--border);border-radius:12px;height:62px;font-size:24px;font-weight:500;font-family:var(--mono);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;touch-action:manipulation;transition:background .1s,transform .08s}
.k:active{background:var(--bg4);transform:scale(.94)}
.k-zero{font-size:24px}
.k-undo{font-size:13px;color:var(--text2)}
.k-undo.off{opacity:.25;pointer-events:none}
.k-redo{font-size:13px;color:var(--text2)}
.k-redo.off{opacity:.25;pointer-events:none}
.k-add{background:var(--green);color:#fff;border-color:var(--green);font-size:15px;font-weight:600;font-family:var(--sans)}
.k-add:active{background:#19a872}
.k-add.off{background:var(--bg3);color:var(--text3);border-color:var(--border);pointer-events:none}

/* history card */
.hist-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:14px 16px;
  box-shadow:0 14px 30px rgba(0,0,0,.45);
}
.sect-label{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.hist-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.hist-row:last-child{border-bottom:none}
.h-check{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;touch-action:manipulation;transition:all .15s}
.h-check.done{background:var(--green);border-color:var(--green)}
.h-val{flex:1;font-family:var(--mono);font-size:20px;font-weight:500;color:var(--text)}
.h-meta{font-size:12px;color:var(--text3);font-family:var(--mono)}

/* bottom bar */
.bottom-bar{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  touch-action:manipulation;
  transition:background .1s, border-color .15s, transform .1s;
  box-shadow:0 10px 26px rgba(0,0,0,.45);
}
.bottom-bar:active{background:var(--bg3)}
.bb-left{display:flex;flex-direction:column;gap:4px}
.bb-count{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.06em}
.bb-pills{display:flex;gap:6px;flex-wrap:wrap}
.bb-pill{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:13px;font-weight:500;font-family:var(--mono);color:var(--text2)}
.bb-arrow{font-size:16px;color:var(--text3)}

/* sheet overlay */
.sheet-over{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;flex-direction:column;justify-content:flex-end}
.sheet{
  background:var(--bg2);
  border-radius:20px 20px 0 0;
  padding:0 16px 36px;
  max-height:75dvh;
  overflow-y:auto;
  box-shadow:0 -16px 40px rgba(0,0,0,.7);
}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:14px auto 16px}
.sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sheet-title{font-size:14px;font-weight:500;color:var(--text2);font-family:var(--mono);letter-spacing:.06em}
.clear-btn{background:none;border:none;font-size:12px;color:var(--red);cursor:pointer;font-family:var(--sans)}
.sess-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.sess-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.sess-total{font-family:var(--mono);font-size:24px;font-weight:500;color:var(--text)}
.sess-outof{font-family:var(--mono);font-size:14px;color:var(--text3)}
.sess-meta{font-family:var(--mono);font-size:11px;color:var(--text3)}
.sess-marks{font-size:12px;color:var(--text2);margin-top:3px;font-family:var(--mono);line-height:1.5}
.empty-state{text-align:center;padding:32px 0;font-size:13px;color:var(--text3);font-family:var(--mono)}

@media (min-width: 720px){
  body{
    align-items:center;
  }
  .app{
    border-radius:24px;
    padding:22px 22px 34px;
  }
}

@media (max-width: 360px){
  .score-num{font-size:58px;letter-spacing:-2px}
  .disp-val{font-size:34px}
  .outof-inp{width:54px}
}

@media (prefers-reduced-motion: reduce){
  *{
    scroll-behavior:auto!important;
    animation-duration:0.01ms!important;
    animation-iteration-count:1!important;
    transition:none!important;
  }
}
</style>
</head>
<body>

<div class="app" id="app"></div>
<div id="sheet-slot"></div>

<script>
const KEY = 'marks_v2';
function loadState() {
  try { const d = localStorage.getItem(KEY); return d ? JSON.parse(d) : {}; } catch(e) { return {}; }
}
function saveState(s) {
  try {
    localStorage.setItem(KEY, JSON.stringify({
      total: s.total, outOf: s.outOf,
      history: s.history, redoStack: s.redoStack, sessions: s.sessions, dark: s.dark
    }));
  } catch(e) {}
}

const defaults = { cur:'', total:0, outOf:80, history:[], redoStack:[], sessions:[], dark:true, sheet:false, flash:false };
const stored = loadState();
const S = Object.assign({}, defaults, stored, { cur:'', sheet:false, flash:false });
let addTimer = null;

// apply initial theme
if (!S.dark) document.body.classList.add('light');

function fmt(n) { return n % 1 === 0 ? String(n) : n.toFixed(1); }

function persist() {
  saveState(S);
  S.flash = true;
  render();
}

function clearAddTimer() {
  if (addTimer) {
    clearTimeout(addTimer);
    addTimer = null;
  }
}

function scheduleAutoAdd(delayMs) {
  clearAddTimer();
  if (S.cur === '') return;
  const currentCur = S.cur;
  addTimer = setTimeout(() => {
    if (S.cur !== currentCur) return;
    const v = parseFloat(S.cur);
    const remain = parseFloat((S.outOf - S.total).toFixed(4));
    if (!isNaN(v) && S.cur !== '' && v <= remain) {
      tryAdd();
    } else {
      render();
    }
  }, delayMs);
}

function tryAdd() {
  clearAddTimer();
  const v = parseFloat(S.cur);
  if (isNaN(v) || S.cur === '') return;
  const nt = parseFloat((S.total + v).toFixed(4));
  if (nt > S.outOf) return;
  S.total = nt;
  S.history.push({ v, done: false });
  S.redoStack = [];
  S.cur = '';
  persist();
}

function pressKey(k) {
  if (k === 'add') { clearAddTimer(); tryAdd(); return; }
  if (k === 'undo') { clearAddTimer(); undo(); return; }
  if (k === 'redo') { clearAddTimer(); redo(); return; }
  if (S.cur.length >= 2) return;
  const next = S.cur + k;
  const v = parseFloat(next);
  const remain = parseFloat((S.outOf - S.total).toFixed(4));
  if (!isNaN(v) && v > remain) return;
  S.cur = next;
  const delay = S.cur.length === 2 ? 1000 : 2000;
  scheduleAutoAdd(delay);
  render();
}

function undo() {
  clearAddTimer();
  if (!S.history.length) return;
  const last = S.history.pop();
  S.redoStack.push(last);
  S.total = parseFloat((S.total - last.v).toFixed(4));
  S.cur = '';
  persist();
}

function redo() {
  clearAddTimer();
  if (!S.redoStack.length) return;
  const entry = S.redoStack.pop();
  const nt = parseFloat((S.total + entry.v).toFixed(4));
  if (nt > S.outOf) return;
  S.total = nt;
  S.history.push(entry);
  S.cur = '';
  persist();
}

function toggleDone(i) { S.history[i].done = !S.history[i].done; persist(); }

function finishSession() {
  clearAddTimer();
  if (S.total === 0 && S.history.length === 0) return;
  const pct = S.outOf > 0 ? ((S.total / S.outOf) * 100).toFixed(1) : '—';
  const nums = S.history.map(e => fmt(e.v)).join(', ');
  S.sessions.unshift({
    total: S.total, outOf: S.outOf, pct,
    count: S.history.length, nums,
    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
    date: new Date().toLocaleDateString([], { day: 'numeric', month: 'short' })
  });
  if (S.sessions.length > 30) S.sessions.pop();
  S.total = 0; S.history = []; S.cur = '';
  persist();
}

function skipSession() {
  clearAddTimer();
  if (S.total === 0 && S.history.length === 0) return;
  S.total = 0; S.history = []; S.cur = '';
  persist();
}
function toggleSheet() { S.sheet = !S.sheet; render(); }
function clearSessions() { if(confirm('Clear all sessions?')) { S.sessions = []; persist(); } }
function toggleDark() {
  S.dark = !S.dark;
  document.body.classList.toggle('light', !S.dark);
  persist();
}

function render() {
  const pct = S.outOf > 0 ? (S.total / S.outOf) * 100 : 0;
  const remain = parseFloat((S.outOf - S.total).toFixed(4));
  const barCol = pct >= 90 ? 'var(--red)' : pct >= 70 ? 'var(--amber)' : 'var(--green)';
  const scoreCol = pct >= 90 ? 'var(--red)' : pct >= 70 ? 'var(--amber)' : 'var(--text)';
  const cv = parseFloat(S.cur);
  const wouldExceed = !isNaN(cv) && S.cur !== '' && (S.total + cv) > S.outOf;
  const canAdd = !isNaN(cv) && S.cur !== '' && !wouldExceed;
  const hasWork = S.history.length > 0 || S.total > 0;
  const last3 = S.history.slice(-3).reverse();
  const last3s = S.sessions.slice(0, 3);

  const undoSVG = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3.5 7H11C13.2 7 15 8.8 15 11 15 13.2 13.2 15 11 15H7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M6 4.5L3.5 7 6 9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const redoSVG = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M14.5 7H7C4.8 7 3 8.8 3 11 3 13.2 4.8 15 7 15H11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M12 4.5L14.5 7 12 9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const checkSVG = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const saveSVG  = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8.5L6 12.5L14 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const skipSVG  = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 8h8M9 5l3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  const lastEntries = S.history.slice(-3).reverse();
  const entriesHTML = lastEntries.length
    ? `<div class="entries-strip">
        <span class="strip-label">last 3:</span>
        ${lastEntries.map((e,i) => `<span class="entry-chip ${i===0?'latest':''}">${fmt(e.v)}</span>`).join('')}
       </div>`
    : `<span class="strip-label" style="color:var(--text3)">no entries yet</span>`;

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <button class="icon-btn" onclick="toggleDark()" style="flex-shrink:0">${S.dark ? '☀' : '◑'}</button>
      <div style="flex:1;overflow:hidden;padding:0 10px">${entriesHTML}</div>
      <span class="saved-tag ${S.flash ? 'show' : ''}" style="flex-shrink:0">saved ✓</span>
    </div>

    <div class="score-card">
      <div class="outof-row">
        <span class="outof-label">out of</span>
        <input class="outof-inp" type="number" value="${S.outOf}" min="1" max="999"
          oninput="clearAddTimer();S.outOf=parseFloat(this.value)||80;if(S.total>S.outOf)S.total=S.outOf;S.cur='';persist();" />
        <span style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:4px">${remain > 0 ? fmt(remain) + ' left' : 'full'}</span>
      </div>
      <div class="score-main">
        <div class="score-num" style="color:${scoreCol}">${fmt(S.total)}</div>
        <div class="score-sub">${pct.toFixed(1)}%</div>
        <div class="score-hint">
          <span>last:</span>
          ${lastEntries.length ? lastEntries.map(e => `<span>${fmt(e.v)}</span>`).join('') : '<span>—</span>'}
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.min(100, pct)}%;background:${barCol}"></div>
        </div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-save ${hasWork ? 'active' : 'inactive'}" onclick="skipSession()">
        ${skipSVG} skip copy
      </button>
      <button class="btn-skip ${hasWork ? 'has-work' : 'inactive'}" onclick="finishSession()">
        ${saveSVG} save &amp; next
      </button>
    </div>

    <div class="kbd-card">
      <div class="disp-row">
        <div class="display-box">
          <span class="disp-val ${S.cur === '' ? 'empty' : ''}">${S.cur === '' ? '—' : S.cur}</span>
        </div>
      </div>
      ${wouldExceed ? `<div class="warn-row">only ${fmt(remain)} left — can't add ${fmt(cv)}</div>` : ''}
      <div class="kbd">
        ${[1,2,3,4,5,6,7,8,9].map(n => `<div class="k" onclick="pressKey('${n}')">${n}</div>`).join('')}
        <div class="k k-undo ${S.history.length ? '' : 'off'}" onclick="pressKey('undo')">${undoSVG}</div>
        <div class="k k-zero" onclick="pressKey('0')">0</div>
        <div class="k k-add" onclick="skipSession()">skip</div>
        <div class="k k-redo ${S.redoStack && S.redoStack.length ? '' : 'off'}" style="grid-column:span 3;height:44px;font-size:13px;color:var(--text2);gap:6px" onclick="${S.redoStack&&S.redoStack.length?'pressKey(\'redo\')':''}">
          ${redoSVG} <span style="font-size:13px;font-family:var(--mono)">redo${S.redoStack&&S.redoStack.length?' ('+fmt(S.redoStack[S.redoStack.length-1].v)+')':''}</span>
        </div>
      </div>
    </div>

    <div class="bottom-bar" onclick="toggleSheet()">
      <div class="bb-left">
        <span class="bb-count">${S.sessions.length ? S.sessions.length + ' session' + (S.sessions.length !== 1 ? 's' : '') + ' saved' : 'no sessions yet'}</span>
        <div class="bb-pills">
          ${last3s.length
            ? last3s.map(s => `<span class="bb-pill">${fmt(s.total)}/${s.outOf}</span>`).join('')
            : `<span style="font-size:12px;color:var(--text3);font-family:var(--mono)">tap to view history</span>`}
        </div>
      </div>
      <span class="bb-arrow">${S.sheet ? '↓' : '↑'}</span>
    </div>
  `;

  // sheet
  const slot = document.getElementById('sheet-slot');
  if (S.sheet) {
    slot.innerHTML = `<div class="sheet-over" onclick="if(event.target===this)toggleSheet()">
      <div class="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-head">
          <span class="sheet-title">past sessions</span>
          ${S.sessions.length ? `<button class="clear-btn" onclick="clearSessions()">clear all</button>` : ''}
        </div>
        ${S.sessions.length === 0
          ? `<div class="empty-state">no sessions yet<br/>finish a copy to save one</div>`
          : S.sessions.map(s => `<div class="sess-card">
              <div class="sess-top">
                <span><span class="sess-total">${fmt(s.total)}</span><span class="sess-outof"> / ${s.outOf}</span></span>
                <span class="sess-meta">${s.date} · ${s.time} · ${s.pct}%</span>
              </div>
              <div class="sess-marks">${s.count} mark${s.count !== 1 ? 's' : ''} · ${s.nums.length > 50 ? s.nums.slice(0, 50) + '…' : s.nums}</div>
            </div>`).join('')}
      </div>
    </div>`;
  } else {
    slot.innerHTML = '';
  }
}

render();
</script>
</body>
</html>
